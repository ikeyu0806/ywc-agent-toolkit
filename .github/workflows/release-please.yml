name: Release Please

# Runs on every push to main. Creates or updates a Release PR that:
#   - bumps the version in .release-please-manifest.json and version.txt
#   - prepends a new section to CHANGELOG.md
# When the Release PR is merged, creates a git tag (e.g. v1.1.0).
# The existing release.yml then picks up the tag and creates the GitHub Release.
#
# Version bump rules (Conventional Commits):
#   feat:              minor bump  (1.0.0 → 1.1.0)
#   fix:               patch bump  (1.0.0 → 1.0.1)
#   feat! / BREAKING:  major bump  (1.0.0 → 2.0.0)
#   chore: / docs:     tracked in CHANGELOG, no release triggered
#   → To force a patch release for chore/docs-only work,
#     add the label  release-as: patch  to the PR before merging.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # GitHub Release creation is handled by release.yml (v* tag trigger).
          # This action only creates the Release PR and the git tag.
          skip-github-release: "true"
