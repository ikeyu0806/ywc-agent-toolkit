name: Markdown Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            README*.md
            CONTRIBUTING*.md
            claude-code/skills/*/README*.md
            codex/skills/*/README*.md
          config: |
            {
              "MD013": false,
              "MD033": false,
              "MD041": false
            }
