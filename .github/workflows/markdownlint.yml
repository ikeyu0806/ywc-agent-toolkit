name: Markdown Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        run: |
          printf '{"MD013":false,"MD031":false,"MD033":false,"MD037":false,"MD040":false,"MD041":false,"MD060":false}' > /tmp/ml.json
          npx markdownlint-cli2 --config /tmp/ml.json \
            "README*.md" \
            "CONTRIBUTING*.md" \
            "claude-code/skills/*/README*.md" \
            "codex/skills/*/README*.md"
