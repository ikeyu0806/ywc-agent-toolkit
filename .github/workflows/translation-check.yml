name: Translation Check

on:
  pull_request:
    paths:
      - 'README.md'
      - 'claude-code/skills/*/README.md'
      - 'codex/skills/*/README.md'

permissions:
  pull-requests: write

jobs:
  check-translations:
    name: Check translation sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect untranslated changes
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Read language list from translations.json (single source of truth)
            const translationsConfig = JSON.parse(fs.readFileSync('translations.json', 'utf8'));
            const tier1Langs = translationsConfig.languages.tier1.codes.filter(l => l !== 'en');
            const tier2Langs = translationsConfig.languages.tier2.codes;

            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const changedFiles = execSync(`git diff --name-only ${base} ${head}`)
              .toString().trim().split('\n').filter(Boolean);

            const englishReadmes = changedFiles.filter(f =>
              f === 'README.md' ||
              /^(claude-code|codex)\/skills\/[^/]+\/README\.md$/.test(f)
            );

            if (englishReadmes.length === 0) return;

            const tier1Warnings = [];
            const tier2Warnings = [];

            for (const readme of englishReadmes) {
              const dir = readme.replace(/README\.md$/, '');
              for (const lang of tier1Langs) {
                const translated = `${dir}README.${lang}.md`;
                if (!changedFiles.includes(translated)) {
                  tier1Warnings.push(`- \`${readme}\` → \`${translated}\` (Tier 1 — manual update recommended)`);
                }
              }
              for (const lang of tier2Langs) {
                const translated = `${dir}README.${lang}.md`;
                if (!changedFiles.includes(translated)) {
                  tier2Warnings.push(`- \`${readme}\` → \`${translated}\` (Tier 2 — run \`bash scripts/translate.sh --lang ${lang}\`)`);
                }
              }
            }

            if (tier1Warnings.length === 0 && tier2Warnings.length === 0) return;

            const body = [
              '## Translation Check',
              '',
              'The following translation files may need updating:',
              '',
            ];

            if (tier1Warnings.length > 0) {
              body.push('### Tier 1 — Manually maintained (ja, ko)');
              body.push('');
              body.push(...tier1Warnings);
              body.push('');
            }

            if (tier2Warnings.length > 0) {
              body.push('### Tier 2 — AI-generated (es, zh)');
              body.push('');
              body.push(...tier2Warnings);
              body.push('');
            }

            body.push('This warning is informational only — it does not block merging.');
            body.push('See [CONTRIBUTING.md](CONTRIBUTING.md#translations) for the translation guide.');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.join('\n')
            });
