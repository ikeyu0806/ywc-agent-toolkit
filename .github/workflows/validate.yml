name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        run: |
          bash scripts/validate.sh

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Test install script (dry run)
        run: |
          bash scripts/install.sh --list

      # Mechanical (deterministic) quality-regression gate for the distributed
      # skills/agents. The eval tool itself lives in .claude/ (project-local, not
      # distributed) since it only runs inside this repo. Compares per-axis
      # structural scores against the committed baseline and fails on any drop.
      # When a PR legitimately changes scores, regenerate the baseline locally with
      # `python3 .claude/skills/ywc-toolkit-eval/scripts/score.py --ci` and commit it.
      - name: Toolkit eval — mechanical regression gate
        run: |
          python3 .claude/skills/ywc-toolkit-eval/scripts/score.py --ci
