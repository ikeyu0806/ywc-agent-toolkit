name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Claude Code skills
        run: |
          failed=0
          for skill_dir in claude-code/skills/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name="$(basename "$skill_dir")"
            skill_md="${skill_dir}SKILL.md"
            if [ ! -f "$skill_md" ]; then
              echo "ERROR: $skill_name is missing SKILL.md"
              failed=1
              continue
            fi
            if ! grep -q "^name:" "$skill_md"; then
              echo "ERROR: $skill_name/SKILL.md is missing 'name:' in frontmatter"
              failed=1
            fi
            if ! grep -q "^description:" "$skill_md"; then
              echo "ERROR: $skill_name/SKILL.md is missing 'description:' in frontmatter"
              failed=1
            fi
          done
          exit $failed

      - name: Validate Codex skills
        run: |
          failed=0
          for skill_dir in codex/skills/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name="$(basename "$skill_dir")"
            skill_md="${skill_dir}SKILL.md"
            if [ ! -f "$skill_md" ]; then
              echo "ERROR: $skill_name is missing SKILL.md"
              failed=1
            fi
          done
          exit $failed

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Test install script (dry run)
        run: |
          bash scripts/install.sh --list
